name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Allure MCP Server are you running?
      placeholder: "e.g. v1.0.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      options:
        - stdio (local / Claude Desktop)
        - HTTP (team / server)
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Binary (local build)
        - Docker
        - Docker Compose
        - Kubernetes
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Send request `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (set LOG_LEVEL=DEBUG for more detail).
      render: text

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "e.g. go1.22.3"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one
          required: true
        - label: I am not including secrets or credentials in this report
          required: true
